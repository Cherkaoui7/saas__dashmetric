services:
  postgres:
    image: postgres:16
    container_name: dashmetrics_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashmetrics

    ports:
      - "5433:5432"

    command: postgres -c password_encryption=md5

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: